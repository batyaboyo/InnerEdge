repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: backend-tests
        name: backend tests
        entry: c:/Users/batzt/Desktop/b7b/projects/InnerEdge/.venv/Scripts/python.exe -m pytest -q
        language: system
        pass_filenames: false

      - id: frontend-lint
        name: frontend lint
        entry: bash -lc 'cd frontend && npm run lint'
        language: system
        pass_filenames: false

      - id: frontend-build
        name: frontend build
        entry: bash -lc 'cd frontend && npm run build'
        language: system
        pass_filenames: false
